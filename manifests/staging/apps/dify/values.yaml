# Staging overrides for BorisPolonsky/dify-helm (chart dify).
# Pin chart version in kustomization.yaml.
# Vultr block storage supports ReadWriteOnce only (not ReadWriteMany).

global:
  edition: SELF_HOSTED
  storageClass: vultr-block-storage-hdd
  appSecretKey: ""
  consoleApiDomain: "https://dify.70.34.202.247.nip.io"
  consoleWebDomain: "https://dify.70.34.202.247.nip.io"
  serviceApiDomain: "https://dify.70.34.202.247.nip.io"
  appApiDomain: "https://dify.70.34.202.247.nip.io"
  appWebDomain: "https://dify.70.34.202.247.nip.io"
  filesDomain: "https://dify.70.34.202.247.nip.io"
  triggerDomain: "https://dify.70.34.202.247.nip.io"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: dify.70.34.202.247.nip.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dify-tls
      hosts:
        - dify.70.34.202.247.nip.io

api:
  replicas: 1
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      storageClass: vultr-block-storage-hdd
  extraEnv:
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: dify-global-secret
          key: app-secret-key
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi

worker:
  replicas: 1
  extraEnv:
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: dify-global-secret
          key: app-secret-key
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi

beat:
  extraEnv:
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: dify-global-secret
          key: app-secret-key

pluginDaemon:
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      storageClass: vultr-block-storage-hdd

web:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

postgresql:
  enabled: true
  architecture: standalone
  readReplicas:
    replicaCount: 0
  primary:
    persistence:
      size: 10Gi
      storageClass: vultr-block-storage-hdd
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi

redis:
  enabled: true
  architecture: standalone
  master:
    persistence:
      size: 2Gi
      storageClass: vultr-block-storage-hdd
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

weaviate:
  enabled: true
  storage:
    size: 10Gi
    storageClassName: vultr-block-storage-hdd
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
